name: Docker Build & Scan

on:
  push:
    branches:
      - "main"
  schedule:
    - cron: '0 4 * * 0' # Weekly on Sunday at 04:00 UTC
  workflow_dispatch:
    inputs:
      rebuild:
        description: 'Force rebuild'
        required: false
        default: 'false'

env:
  IMAGE_NAME: cbcvaughan/terragrunt

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
          API_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Use GITHUB_TOKEN for API rate limits
          REBUILD: ${{ inputs.rebuild }}
          CIRCLE_BRANCH: ${{ github.ref_name }} # Simulate CircleCI env var for build.sh
        run: |
          # Install dependencies required by build.sh
          sudo apt-get update && sudo apt-get install -y jq curl

          # Run the build script
          bash ./build.sh

  scan:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          timeout: '10m0s'
