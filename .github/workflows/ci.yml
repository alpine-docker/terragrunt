name: CI

on:
  push:
    branches:
      - "main"
  schedule:
    - cron: '0 4 * * 0' # Weekly on Sunday at 04:00 UTC
  workflow_dispatch:
    inputs:
      rebuild:
        description: 'Force rebuild'
        required: false
        default: 'false'

env:
  IMAGE_NAME: cbcvaughan/terragrunt

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl unzip

      - name: Fetch latest versions
        id: versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          get_latest() {
            curl -sL -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$1/releases/latest" | jq -r '.tag_name | ltrimstr("v")'
          }

          echo "Fetching latest versions..."
          TERRAFORM=$(get_latest "hashicorp/terraform")
          TERRAGRUNT=$(get_latest "gruntwork-io/terragrunt")
          BOILERPLATE=$(get_latest "gruntwork-io/boilerplate")
          OPENTOFU=$(get_latest "opentofu/opentofu")

          echo "TERRAFORM=$TERRAFORM" >> $GITHUB_ENV
          echo "TERRAGRUNT=$TERRAGRUNT" >> $GITHUB_ENV
          echo "BOILERPLATE=$BOILERPLATE" >> $GITHUB_ENV
          echo "OPENTOFU=$OPENTOFU" >> $GITHUB_ENV

          echo "Versions found: Terraform=$TERRAFORM, Terragrunt=$TERRAGRUNT, Boilerplate=$BOILERPLATE, OpenTofu=$OPENTOFU"

      - name: Install Tools Locally
        run: |
          echo "Installing Terraform $TERRAFORM..."
          curl -sL "https://releases.hashicorp.com/terraform/${TERRAFORM}/terraform_${TERRAFORM}_linux_amd64.zip" -o terraform.zip
          unzip -q terraform.zip && sudo mv terraform /usr/local/bin/ && rm terraform.zip

          echo "Installing Terragrunt $TERRAGRUNT..."
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT}/terragrunt_linux_amd64" -o terragrunt
          chmod +x terragrunt && sudo mv terragrunt /usr/local/bin/

          echo "Installing OpenTofu $OPENTOFU..."
          curl -sL "https://github.com/opentofu/opentofu/releases/download/v${OPENTOFU}/tofu_${OPENTOFU}_linux_amd64.tar.gz" -o tofu.tar.gz
          tar -xzf tofu.tar.gz tofu && sudo mv tofu /usr/local/bin/ && rm tofu.tar.gz

      - name: Run Tests
        run: bash test/test.sh

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
          API_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Use GITHUB_TOKEN for API rate limits
          REBUILD: ${{ inputs.rebuild }}
          CIRCLE_BRANCH: ${{ github.ref_name }} # Simulate CircleCI env var for build.sh
        run: |
          # Install dependencies required by build.sh
          sudo apt-get update && sudo apt-get install -y jq curl

          # Run the build script
          bash ./build.sh
